services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        USERNAME: dev
        UID: 1000
        GID: 1000
    working_dir: /app
    volumes:
      - .:/app:cached
    stdin_open: true
    tty: true
    init: true
    profiles: ["dev"]
    command: sleep infinity

  center:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CENTER_CONFIG_PATH: ${CENTER_CONFIG_PATH:-/app/config.yml}
    volumes:
      - ./config.compose.yml:/app/runtime-config/config.compose.yml:ro
    command: python -m capstone_center.main
